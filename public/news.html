<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آخر الأخبار والعروض | MO CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 50px 20px; }
        h1 { color: #ffcc00; text-align: center; font-size: 32px; font-weight: 900; margin-bottom: 40px; }
        
        /* شبكة المقالات */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        
        .news-card { background: #0a0a0a; border: 1px solid #222; border-radius: 20px; overflow: hidden; transition: 0.3s; text-decoration: none; color: inherit; }
        .news-card:hover { border-color: #ffcc00; transform: translateY(-5px); }
        .news-card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 20px; }
        .card-tag { color: #ffcc00; font-size: 12px; font-weight: bold; display: block; margin-bottom: 10px; }
        .card-title { font-size: 18px; margin: 0 0 10px 0; color: #fff; }
        .card-desc { color: #888; font-size: 14px; line-height: 1.6; }
        
        .btn-back { display: block; width: fit-content; margin: 40px auto; background: #ffcc00; color: #000; text-decoration: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>آخر الأخبار والعروض</h1>
        
        <div class="news-grid">
            <a href="article-1.html" class="news-card">
                <img src="https://via.placeholder.com/400x200/111/ffcc00?text=Offer+1" alt="عرض فودافون">
                <div class="card-content">
                    <span class="card-tag">عروض الباقات</span>
                    <h3 class="card-title">خصم 40% على باقات فودافون RED</h3>
                    <p class="card-desc">استمتع بضعف الميجابايتس لفترة محدودة عند التجديد من خلال MO CONTROL...</p>
                </div>
            </a>

            <a href="article-2.html" class="news-card">
                <img src="https://via.placeholder.com/400x200/111/ffcc00?text=Tech+News" alt="أخبار التقنية">
                <div class="card-content">
                    <span class="card-tag">برمجة وأنظمة</span>
                    <h3 class="card-title">كيفية تحسين أداء هواتف شاومي</h3>
                    <p class="card-desc">خطوات بسيطة لتسريع واجهة HyperOS وتقليل استهلاك البطارية بشكل ملحوظ...</p>
                </div>
            </a>
        </div>

        <a href="index.html" class="btn-back">العودة للرئيسية</a>
    </div>
</body>
</html>
